name: Scheduled chapter check

# Wakes the scaled-to-zero app and runs POST /check, which sweeps every tracked
# manga for new chapters. The cron can't reach the DB directly (SQLite lives on
# the app's volume), so it works by hitting the HTTP endpoint, which auto-starts
# the machine on Fly.
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (UTC); GitHub cron is best-effort
  workflow_dispatch:         # manual "Run workflow" button for testing

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Dead-man's switch (healthchecks.io). The app can't alert on its own cron
      # dying — a dead cron never wakes it — so the *workflow* reports liveness to
      # an external service that pages us when the pings stop. Fail-closed like
      # the app's other secrets: unset -> the ping steps skip and the sweep still
      # runs, so a fork/PR without the secret doesn't error.
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
    steps:
      - name: Trigger /check
        run: |
          curl -fsS -X POST https://mangotrack.fly.dev/check \
            -H "Authorization: Bearer ${{ secrets.CHECK_TOKEN }}"

      # Sweep succeeded -> ping the snitch so it knows we're alive this cycle.
      - name: Ping dead-man's switch (success)
        if: success() && env.HEALTHCHECK_URL != ''
        run: curl -fsS -m 10 --retry 5 "$HEALTHCHECK_URL"

      # Sweep failed (bad token, app down, MangaDex 5xx) -> ping /fail so the
      # snitch records a failure now instead of waiting for pings to lapse.
      - name: Ping dead-man's switch (failure)
        if: failure() && env.HEALTHCHECK_URL != ''
        run: curl -fsS -m 10 --retry 5 "$HEALTHCHECK_URL/fail"
