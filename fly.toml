# fly.toml app configuration file generated for mangotrack on 2026-06-03T16:15:13-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mangotrack'
primary_region = 'sjc'

# Tell the app to write its SQLite file onto the mounted volume (see [mounts]),
# not the container's throwaway filesystem. Not secret, so plain [env] is fine.
[env]
  DB_PATH = '/data/mangotrack.db'
  SENTRY_ENVIRONMENT = 'production'

[build]
  dockerfile = 'Dockerfile'

# Fly's managed Prometheus scrapes this on the private network while the machine
# is awake. /metrics reads cumulative counts from the DB, so the values survive
# scale-to-zero — gaps between wakes, but every sample is the correct total.
[metrics]
  port = 8080
  path = '/metrics'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/ready'

# Persistent disk. `source` MUST match the volume name you create with
# `fly volumes create`; `destination` is where it mounts inside the container.
[mounts]
  source = 'mangotrack_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
